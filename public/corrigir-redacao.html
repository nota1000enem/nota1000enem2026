<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corretor de Redações ENEM - Nota 1000</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    .header p {
      opacity: 0.9;
      font-size: 1.1em;
    }

    .content {
      padding: 40px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
      color: #333;
    }

    textarea {
      width: 100%;
      height: 300px;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 1em;
      resize: vertical;
      transition: border-color 0.3s;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      flex: 1;
      padding: 15px 30px;
      border: none;
      border-radius: 8px;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-corrigir {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-corrigir:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-corrigir:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-limpar {
      background: #f0f0f0;
      color: #333;
    }

    .btn-limpar:hover {
      background: #e0e0e0;
    }

    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      font-weight: 600;
      display: none;
    }

    .status.loading {
      background: #e3f2fd;
      color: #1976d2;
      display: block;
      animation: pulse 1.5s infinite;
    }

    .status.error {
      background: #ffebee;
      color: #c62828;
      display: block;
    }

    .status.success {
      background: #e8f5e9;
      color: #2e7d32;
      display: block;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .resultado {
      margin-top: 40px;
      display: none;
    }

    .resultado.visible {
      display: block;
    }

    .nota-total {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 30px;
    }

    .nota-total h2 {
      font-size: 1.2em;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .nota-valor {
      font-size: 3.5em;
      font-weight: bold;
    }

    .nota-valor-max {
      font-size: 1.5em;
      opacity: 0.9;
      margin-top: 10px;
    }

    .competencias {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .competencia {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }

    .competencia h3 {
      color: #667eea;
      margin-bottom: 10px;
      font-size: 1.1em;
    }

    .competencia-nota {
      font-size: 2em;
      font-weight: bold;
      color: #764ba2;
      margin: 10px 0;
    }

    .competencia-descricao {
      font-size: 0.95em;
      color: #666;
    }

    .feedback-section {
      background: #f9f9f9;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .feedback-section h3 {
      color: #333;
      margin-bottom: 15px;
      font-size: 1.2em;
    }

    .feedback-list {
      list-style: none;
    }

    .feedback-list li {
      padding: 10px 0;
      border-bottom: 1px solid #e0e0e0;
      padding-left: 30px;
      position: relative;
    }

    .feedback-list li:last-child {
      border-bottom: none;
    }

    .feedback-list li:before {
      content: '✓';
      position: absolute;
      left: 0;
      color: #667eea;
      font-weight: bold;
    }

    .pontos-fracos .feedback-list li:before {
      content: '✗';
      color: #d32f2f;
    }

    .feedback-geral {
      background: #fff3e0;
      border-left: 4px solid #f57c00;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .feedback-geral p {
      color: #666;
      line-height: 1.6;
    }

    @media (max-width: 600px) {
      .header h1 {
        font-size: 1.8em;
      }

      .content {
        padding: 20px;
      }

      .button-group {
        flex-direction: column;
      }

      .competencias {
        grid-template-columns: 1fr;
      }

      .nota-valor {
        font-size: 2.5em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎓 Corretor de Redações ENEM</h1>
      <p>Avaliação automática segundo as 5 competências ENEM</p>
    </div>

    <div class="content">
      <form id="form-redacao" onsubmit="event.preventDefault(); corrigir();">
        <div class="form-group">
          <label for="redacao">Cole sua redação aqui:</label>
          <textarea
            id="redacao"
            placeholder="Mínimo 50 caracteres. Cole sua redação completa e clique em 'Corrigir Redação'..."
            required
          ></textarea>
        </div>

        <div class="button-group">
          <button type="submit" class="btn-corrigir" id="btn-corrigir">
            ✨ Corrigir Redação
          </button>
          <button type="button" class="btn-limpar" onclick="limpar()">
            🗑️ Limpar
          </button>
        </div>
      </form>

      <div class="status" id="status"></div>

      <div class="resultado" id="resultado"></div>
    </div>
  </div>

  <script>
    async function corrigir() {
      const texto = document.getElementById('redacao').value.trim();
      const statusEl = document.getElementById('status');
      const resultadoEl = document.getElementById('resultado');
      const btnCorrigir = document.getElementById('btn-corrigir');

      if (!texto || texto.length < 50) {
        statusEl.className = 'status error';
        statusEl.textContent = '❌ Redação deve ter no mínimo 50 caracteres.';
        return;
      }

      // Mostrar loading
      statusEl.className = 'status loading';
      statusEl.textContent = '⏳ Aguardando correção... Isso pode levar alguns segundos.';
      btnCorrigir.disabled = true;
      resultadoEl.classList.remove('visible');

      try {
        const resposta = await fetch('/api/corrigir-redacao', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ texto })
        });

        if (!resposta.ok) {
          const error = await resposta.json();
          throw new Error(error.error || `Erro ${resposta.status}`);
        }

        const correcao = await resposta.json();

        // Validar resposta
        if (!correcao.competencias || !correcao.nota_total) {
          throw new Error('Resposta da IA inválida. Tente novamente.');
        }

        exibirResultado(correcao);
        statusEl.className = 'status success';
        statusEl.textContent = '✅ Redação corrigida com sucesso!';
      } catch (err) {
        console.error('Erro:', err);
        statusEl.className = 'status error';
        statusEl.textContent = `❌ Erro: ${err.message}`;
        resultadoEl.classList.remove('visible');
      } finally {
        btnCorrigir.disabled = false;
      }
    }

    function exibirResultado(correcao) {
      const resultadoEl = document.getElementById('resultado');
      const comp = correcao.competencias;
      const total = correcao.nota_total || 0;

      let html = `
        <div class="nota-total">
          <h2>Nota Final</h2>
          <div class="nota-valor">${total}</div>
          <div class="nota-valor-max">/ 1000</div>
        </div>
      `;

      // Competências
      html += '<div class="competencias">';
      const competenciasTitles = {
        '1': 'Domínio da Norma Padrão',
        '2': 'Compreensão da Proposta',
        '3': 'Seleção e Organização de Informações',
        '4': 'Coerência e Coesão',
        '5': 'Proposta de Solução'
      };

      for (const [num, titulo] of Object.entries(competenciasTitles)) {
        if (comp[num]) {
          const nota = comp[num].nota || 0;
          const descricao = comp[num].descricao || '';
          html += `
            <div class="competencia">
              <h3>Competência ${num}</h3>
              <p style="font-size: 0.9em; color: #666; margin-bottom: 10px;">${titulo}</p>
              <div class="competencia-nota">${nota}/200</div>
              <div class="competencia-descricao">${descricao}</div>
            </div>
          `;
        }
      }
      html += '</div>';

      // Pontos fortes
      if (correcao.pontos_fortes && correcao.pontos_fortes.length > 0) {
        html += `
          <div class="feedback-section">
            <h3>💪 Pontos Fortes</h3>
            <ul class="feedback-list">
              ${correcao.pontos_fortes.map(p => `<li>${p}</li>`).join('')}
            </ul>
          </div>
        `;
      }

      // Pontos fracos
      if (correcao.pontos_fracos && correcao.pontos_fracos.length > 0) {
        html += `
          <div class="feedback-section pontos-fracos">
            <h3>🎯 Pontos a Melhorar</h3>
            <ul class="feedback-list">
              ${correcao.pontos_fracos.map(p => `<li>${p}</li>`).join('')}
            </ul>
          </div>
        `;
      }

      // Feedback geral
      if (correcao.feedback) {
        html += `
          <div class="feedback-geral">
            <p><strong>Feedback Geral:</strong> ${correcao.feedback}</p>
          </div>
        `;
      }

      resultadoEl.innerHTML = html;
      resultadoEl.classList.add('visible');
    }

    function limpar() {
      document.getElementById('redacao').value = '';
      document.getElementById('resultado').classList.remove('visible');
      document.getElementById('status').style.display = 'none';
      document.getElementById('redacao').focus();
    }
  </script>
</body>
</html>
